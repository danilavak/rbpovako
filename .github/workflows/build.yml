name: Build

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:21-jdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Maven Wrapper
        run: chmod +x ./mvnw

      - name: Build
        run: ./mvnw clean package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rbpovako-jar
          path: ./target/*.jar
