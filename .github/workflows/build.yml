name: Build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:21-jdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Maven Wrapper
        run: chmod +x ./mvnw

      - name: Build
        run: ./mvnw clean package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rbpovako-jar
          path: ./target/*.jar

  sast:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Run SAST
        run: semgrep scan --metrics=off --config p/java --config p/findsecbugs --sarif --sarif-output semgrep.sarif . || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
