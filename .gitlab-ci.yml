workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - when: never

stages:
  - build
  - test

build:
  stage: build
  tags:
    - saas-linux-small-amd64
  image: eclipse-temurin:21-jdk
  script:
    - chmod +x ./mvnw
    - ./mvnw clean package
  artifacts:
    paths:
      - ./target/*.jar

sast:
  stage: test
  tags:
    - saas-linux-small-amd64
  script:
    - chmod +x ./mvnw
    - python -m pip install --user semgrep
    - export PATH="$(python -c "import site; print(site.USER_BASE.replace('\\\\', '/'))")/Scripts:$PATH"
    - semgrep scan --metrics=off --config p/java --config p/findsecbugs --gitlab-sast --gitlab-sast-output gl-sast-report.json . || true
  artifacts:
    when: always
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json
