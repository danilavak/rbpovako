workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - when: never

stages:
  - build
  - test

build:
  stage: build
  tags:
    - saas-linux-small-amd64
  image: eclipse-temurin:21-jdk
  script:
    - chmod +x ./mvnw
    - ./mvnw clean package
  artifacts:
    paths:
      - ./target/*.jar

sast:
  stage: test
  tags:
    - saas-linux-small-amd64
  script:
    - chmod +x ./mvnw
    - py -m pip install --user semgrep
    - export PATH="/c/Users/danil/AppData/Roaming/Python/Python312/Scripts:$PATH"
    - semgrep.exe scan --metrics=off --config semgrep/rules.yml --gitlab-sast --gitlab-sast-output gl-sast-report.json . || true
  artifacts:
    when: always
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json

sca:
  stage: test
  tags:
    - saas-linux-small-amd64
  script:
    - chmod +x ./mvnw
    - ./mvnw -B dependency-check:check -DossindexAnalyzerEnabled=false
    - if [ ! -f target/dependency-check-report.html ]; then printf '<html><body>Dependency-Check report was not generated.</body></html>' > target/dependency-check-report.html; fi
  artifacts:
    when: always
    paths:
      - target/dependency-check-report.html
