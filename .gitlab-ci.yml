workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - when: never

variables:
  JAVA_HOME: /c/Users/danil/.jdks/openjdk-25

default:
  before_script:
    - export PATH="$JAVA_HOME/bin:$PATH"

stages:
  - build
  - test

build:
  stage: build
  tags:
    - saas-linux-small-amd64
  image: eclipse-temurin:21-jdk
  script:
    - chmod +x ./mvnw
    - ./mvnw clean package
  artifacts:
    paths:
      - ./target/*.jar

sast:
  stage: test
  tags:
    - saas-linux-small-amd64
  script:
    - chmod +x ./mvnw
    - py -m pip install --user semgrep
    - export PATH="/c/Users/danil/AppData/Roaming/Python/Python312/Scripts:$PATH"
    - semgrep.exe scan --metrics=off --config semgrep/rules.yml --gitlab-sast --gitlab-sast-output gl-sast-report.json . || true
  artifacts:
    when: always
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json

sca:
  stage: test
  tags:
    - saas-linux-small-amd64
  script:
    - chmod +x ./mvnw
    - ./mvnw -B dependency-check:check -DautoUpdate=false -DossindexAnalyzerEnabled=false -DdataDirectory=C:/Users/danil/.m2/repository/org/owasp/dependency-check-data/11.0
    - if [ ! -f target/dependency-check-report.html ]; then printf '<html><body>Dependency-Check report was not generated.</body></html>' > target/dependency-check-report.html; fi
  artifacts:
    when: always
    paths:
      - target/dependency-check-report.html

dast_baseline:
  stage: test
  tags:
    - saas-linux-small-amd64
  image:
    name: zaproxy/zap-stable
    entrypoint: [""]
  needs:
    - job: build
      artifacts: true
  script:
    - mkdir -p target/zap
    - touch .zap/rules.tsv
    - trap 'if [ -f target/zap/app.pid ]; then kill "$(cat target/zap/app.pid)" || true; fi' EXIT
    - java -jar target/*.jar > target/zap/app.log 2>&1 &
    - echo $! > target/zap/app.pid
    - sleep 30
    - curl --fail --silent http://localhost:8080/health > /dev/null
    - zap-baseline.py -t http://localhost:8080 -c .zap/rules.tsv -r target/zap/zap-baseline-report.html -w target/zap/zap-baseline-report.md -J target/zap/zap-baseline-report.json || true
  after_script:
    - if [ -f target/zap/app.pid ]; then kill "$(cat target/zap/app.pid)" || true; fi
  artifacts:
    when: always
    paths:
      - target/zap/zap-baseline-report.html
      - target/zap/zap-baseline-report.md
      - target/zap/zap-baseline-report.json
      - target/zap/app.log

dast_api:
  stage: test
  tags:
    - saas-linux-small-amd64
  image:
    name: zaproxy/zap-stable
    entrypoint: [""]
  needs:
    - job: build
      artifacts: true
  script:
    - mkdir -p target/zap
    - touch .zap/rules.tsv
    - trap 'if [ -f target/zap/app.pid ]; then kill "$(cat target/zap/app.pid)" || true; fi' EXIT
    - java -jar target/*.jar > target/zap/app.log 2>&1 &
    - echo $! > target/zap/app.pid
    - sleep 30
    - curl --fail --silent http://localhost:8080/health > /dev/null
    - zap-api-scan.py -t http://localhost:8080/v3/api-docs -f openapi -c .zap/rules.tsv -r target/zap/zap-api-report.html -w target/zap/zap-api-report.md -J target/zap/zap-api-report.json || true
  after_script:
    - if [ -f target/zap/app.pid ]; then kill "$(cat target/zap/app.pid)" || true; fi
  artifacts:
    when: always
    paths:
      - target/zap/zap-api-report.html
      - target/zap/zap-api-report.md
      - target/zap/zap-api-report.json
      - target/zap/app.log
