spring.application.name=rbpovako
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/rbpovako;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
app.jwt.secret=${JWT_SECRET:rbpovako-secret-key-rbpovako-secret-key-2026}
app.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:15}
app.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:7}
